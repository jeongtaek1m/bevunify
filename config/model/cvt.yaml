# cross_view_transformers. The wrapper builds the real CVT model by composing the
# CVT repo's own hydra config (so the exact architecture is reused, not re-ported),
# then adapts batch I/O to the canonical GaussianLSS contract.
_target_: bevunify.wrappers.cvt.CVTWrapper
key: ${key}
repo_root: third_party/cross_view_transformers
config_name: config
center: true       # emit ${key}_center too (CVT loss uses seg + center)
backbone: efficientnet-b4   # CVT camera encoder (EfficientNetExtractor); also efficientnet-b0
image_h: ${data.image.h}    # CVT sizes positional embeddings to input -> track central resolution
image_w: ${data.image.w}
