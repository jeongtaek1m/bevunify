# LaRa. Wrapper instantiates the raw LaRa net from the LaRa repo config (cfg.model.net)
# and adapts I/O. LaRa consumes binary seg only (use gt/seg_only + loss/seg).
# Requires: pip install fairscale ; env WEIGHTS_PATH for the EfficientNet cam encoder.
_target_: bevunify.wrappers.lara.LaRaWrapper
key: ${key}
repo_root: third_party/LaRa
config_name: train
backbone: b4       # LaRa CamEncode EfficientNet version; also 'b0'
