# @package _global_
# python -m bevunify.train +experiment=cvt
defaults:
  - override /model: cvt
  - override /gt: seg_center        # CVT loss uses seg + center
  - override /loss: seg_center
  - override /recipe: cvt           # CVT lr/scheduler/steps
  - override /metrics: bev_metrics

data:
  split_intrin_extrin: True         # CVT forward needs intrinsics + extrinsics + cam_idx
  augment_img: False
  augment_bev: False
  vehicle: True

# CVT native center weight = 0.1 (shared seg_center default is 2.0)
loss:
  center_weight: 0.1

experiment:
  project: bevseg-cvt

key: vehicle
val_only: False
