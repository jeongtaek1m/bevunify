# @package _global_
# python -m bevunify.train +experiment=lara
defaults:
  - override /model: lara
  - override /gt: seg_only          # LaRa loss uses binary seg only
  - override /loss: seg_bce        # LaRa native: BCE pos_weight=2.13
  - override /recipe: lara          # Adam + StepLR, 30 epochs
  - override /metrics: bev_metrics
  - override /augmentation: none    # set warp|extrin_noise|warp_extrin to augment

data:
  split_intrin_extrin: True         # need intrinsics + extrinsics -> rots/trans
  vehicle: True

experiment:
  project: bevseg-lara

# batch 16/GPU (targets B200). NOTE: LaRa's Perceiver latent attention OOMs a 48GB card
# at 16 — lower per-GPU there if running on smaller VRAM.
loader:
  train_batch_size: 16
  val_batch_size: 16

key: vehicle
val_only: False
