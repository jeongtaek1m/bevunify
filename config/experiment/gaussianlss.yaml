# @package _global_
# python -m bevunify.train +experiment=gaussianlss
defaults:
  - override /model: gaussianlss
  - override /gt: seg_center_offset
  - override /loss: seg_center_offset
  - override /recipe: gaussianlss
  - override /metrics: bev_metrics
  - override /augmentation: none   # off for fair comparison; warp|extrin_noise|warp_extrin to augment

data:
  split_intrin_extrin: False     # GaussianLSS native: batch carries 'lidar2img'
  vehicle: True

# SegHead channel slices for the multi-head output.
# NOTE: literal keys — OmegaConf does NOT interpolate ${key} into a dict KEY.
model:
  head:
    outputs:
      vehicle: [0, 1]
      vehicle_center: [1, 2]
      vehicle_offset: [2, 4]

experiment:
  project: bevseg-gaussianlss

key: vehicle
val_only: False
