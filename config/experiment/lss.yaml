# @package _global_
# python -m bevunify.train +experiment=lss
defaults:
  - override /model: lss
  - override /gt: seg_only           # LSS loss uses binary seg only
  - override /loss: seg_bce        # LSS native: BCE pos_weight=2.13
  - override /recipe: lss            # Adam, constant LR
  - override /metrics: bev_metrics
  - override /augmentation: none     # set warp|extrin_noise|warp_extrin to augment

data:
  split_intrin_extrin: True          # need intrinsics + extrinsics -> rots/trans
  vehicle: True

experiment:
  project: bevseg-lss

key: vehicle
val_only: False
