# @package _global_
# python -m bevunify.train +experiment=simplebev
defaults:
  - override /model: simplebev
  - override /gt: seg_center_offset   # simple_bev loss uses seg + center + offset
  - override /loss: seg_balanced_footprint_bce   # simple_bev native: BCE seg + balanced-MSE center + footprint offset
  - override /recipe: simplebev
  - override /metrics: bev_metrics
  - override /augmentation: none    # set warp|extrin_noise|warp_extrin to augment

data:
  split_intrin_extrin: True
  vehicle: True

experiment:
  project: bevseg-simplebev

key: vehicle
val_only: False
