# @package _global_
# lift-splat-shoot original recipe: Adam, constant LR (no scheduler).
# LSS has no canonical budget (trains until val plateau); we cap at 40 epochs.
optimizer:
  _target_: torch.optim.Adam
  lr: 1e-3
  weight_decay: 1e-7
scheduler: null                  # constant LR
trainer:
  max_steps: -1
  max_epochs: 40
