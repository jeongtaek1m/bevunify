# @package _global_
# PointBeV recipe: AdamW + OneCycleLR. 30 epochs (OneCycle total_steps auto-filled from
# trainer.estimated_stepping_batches since max_steps=-1).
# NOTE: batch 16/GPU OOMs a 48 GB card here — run at 8/GPU on this server (see run script).
optimizer:
  lr: 3e-4
  weight_decay: 1e-7
scheduler:
  div_factor: 3
  pct_start: 0.05
  final_div_factor: 20
  max_lr: ${optimizer.lr}
  total_steps: ${trainer.max_steps}
  cycle_momentum: False
  anneal_strategy: "linear"
  interval: step
trainer:
  max_steps: -1
  max_epochs: 30
