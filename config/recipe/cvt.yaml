# @package _global_
# cross_view_transformers recipe: AdamW + OneCycleLR. 30 epochs (OneCycle total_steps is
# auto-filled from trainer.estimated_stepping_batches since max_steps=-1).
optimizer:
  lr: 4e-3
  weight_decay: 1e-7
scheduler:
  div_factor: 10
  pct_start: 0.3
  final_div_factor: 10
  max_lr: ${optimizer.lr}
  total_steps: ${trainer.max_steps}
  cycle_momentum: False
  anneal_strategy: "cos"          # CVT default (was mistakenly 'linear')
  interval: step
trainer:
  max_steps: -1
  max_epochs: 30
