# @package _global_
# DSPE (IROS2024 robust-CVT) recipe.
#   - 50 epochs        : from the PAPER (IV.B "batch size of 4 per GPU spanning 50 epochs").
#   - AdamW + OneCycle : from the PAPER (no LR value given there).
#   - lr 1.2e-2, wd 1e-7, OneCycle div10/pct0.3/final10, grad_clip 5.0 : from the iros2024
#     CODE (config/config.yaml) — the paper does NOT state a numeric LR.
# Per-GPU batch is bevunify's default 16 (same as CVT; not set here). Paper's effective
# batch ~32 (4/GPU x 8 GPU) is matched by running on 2 GPUs (16 x 2). Trained CLEAN
# (augmentation: none) — extrinsic noise is an EVAL-time robustness test, not a train aug.
optimizer:
  _target_: torch.optim.AdamW
  lr: 1.2e-2
  weight_decay: 1e-7
scheduler:
  div_factor: 10
  pct_start: 0.3
  final_div_factor: 10
  max_lr: ${optimizer.lr}
  total_steps: ${trainer.max_steps}
  cycle_momentum: False
  anneal_strategy: "cos"
  interval: step
trainer:
  max_steps: -1
  max_epochs: 50
  gradient_clip_val: 5.0

# per-model batch (pushed). 16/GPU x 2 GPU = eff 32 = the paper's effective batch
# (4/GPU x 8 GPU) that lr 1.2e-2 was tuned for. Fits a 48 GB card.
loader:
  train_batch_size: 16
  val_batch_size: 16
