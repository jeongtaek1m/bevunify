# @package _global_
# LaRa original recipe: Adam + StepLR (epoch-based), 30 epochs.
optimizer:
  _target_: torch.optim.Adam
  lr: 3e-4
  weight_decay: 1e-5
scheduler:
  _target_: torch.optim.lr_scheduler.StepLR
  step_size: 20
  gamma: 0.1
  interval: epoch                # StepLR steps once per epoch
trainer:
  max_steps: -1
  max_epochs: 30
  gradient_clip_val: null     # LaRa native: NO gradient clipping (overrides base 5.0)
