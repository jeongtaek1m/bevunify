# @package _global_
# GaussianLSS recipe: AdamW + OneCycleLR, 50 epochs (OneCycle total_steps auto-filled
# from trainer.estimated_stepping_batches since max_steps=-1).
optimizer:
  lr: 3e-4
  weight_decay: 1e-7
scheduler:
  div_factor: 3
  pct_start: 0.05
  final_div_factor: 20
  max_lr: ${optimizer.lr}
  total_steps: ${trainer.max_steps}
  cycle_momentum: False
  anneal_strategy: "linear"
  interval: step
trainer:
  max_steps: -1
  max_epochs: 50

# per-model batch. 16/GPU x 2-GPU DDP = effective 32 — the setting ALL production
# CARLA ckpts were trained with (verified from ckpt hyper_parameters.loader across
# sedan/suv/bus). Earlier this file said 32/GPU and the launcher forced 16 via CLI;
# the override is now baked in so a plain `+experiment=gaussianlss` reproduces the
# baseline exactly without remembering the CLI flag.
loader:
  train_batch_size: 16
  val_batch_size: 16
