# @package _global_
# GaussianLSS recipe: AdamW + OneCycleLR, 50 epochs (OneCycle total_steps auto-filled
# from trainer.estimated_stepping_batches since max_steps=-1).
optimizer:
  lr: 3e-4
  weight_decay: 1e-7
scheduler:
  div_factor: 3
  pct_start: 0.05
  final_div_factor: 20
  max_lr: ${optimizer.lr}
  total_steps: ${trainer.max_steps}
  cycle_momentum: False
  anneal_strategy: "linear"
  interval: step
trainer:
  max_steps: -1
  max_epochs: 50

# per-model batch (pushed so every server matches). 32 = power-of-2 for GPU efficiency;
# needs high VRAM (B200) — OOMs a 48 GB card. effective batch = train_batch_size x devices.
loader:
  train_batch_size: 32
  val_batch_size: 32
