# @package _global_
# simple_bev original recipe: AdamW + OneCycleLR, step-based (~100k iters).
optimizer:
  lr: 3e-4
  weight_decay: 1e-7
scheduler:
  div_factor: 25                 # OneCycle default; simple_bev uses near-default warmup
  pct_start: 0.05
  final_div_factor: 1e4
  max_lr: ${optimizer.lr}
  total_steps: ${trainer.max_steps}
  cycle_momentum: False
  anneal_strategy: "linear"
  interval: step
trainer:
  max_steps: 100000             # simple_bev max_iters; effective batch x grad_acc=5
  max_epochs: -1
