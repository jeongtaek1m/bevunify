# @package _global_
# EAFormer recipe. TWO documented protocols (per-GPU batch stays 16 in both):
#
#  A) paper-exact (defaults below): 1 GPU, effective batch 16, lr 4e-3, 30 ep
#       CUDA_VISIBLE_DEVICES=0 python -m bevunify.train +experiment=eaformer trainer.devices=1
#  B) 2-GPU DDP: effective batch 32 -> sqrt-scale lr; epochs per comparison need:
#       30 ep (epoch-parity with the other models' 30-ep runs):
#         python -m bevunify.train +experiment=eaformer optimizer.lr=5.7e-3
#       60 ep (update-count parity with the paper's ~52.7k steps):
#         python -m bevunify.train +experiment=eaformer optimizer.lr=5.7e-3 trainer.max_epochs=60
#
# Always state the protocol next to any reported number (A vs B are not interchangeable).
# OneCycle total_steps auto-fills from trainer.estimated_stepping_batches (max_steps=-1).
optimizer:
  lr: 4e-3
  weight_decay: 1e-7
scheduler:
  div_factor: 10
  pct_start: 0.3
  final_div_factor: 10
  max_lr: ${optimizer.lr}
  total_steps: ${trainer.max_steps}
  cycle_momentum: False
  anneal_strategy: "cos"
  interval: step
trainer:
  max_steps: -1
  max_epochs: 30
