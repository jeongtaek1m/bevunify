# simple_bev-native: BCE(pos_weight=2.13) seg + balanced-MSE center + footprint-masked
# offset, balanced by LEARNABLE homoscedastic uncertainty weighting (simple_bev train_nuscenes:
# ce = 10*loss/exp(w); center/offset = 0.5*loss/exp(w); each + 0.5*w, w optimized).
# Negative weight in MultipleLoss => learnable with base=|weight|: bev base 10, center/offset 0.5.
center_weight: -0.5
center:
  _target_: bevunify.losses.BalancedMSECenterLoss
  key: ${key}

offset_weight: -0.5
offset:
  _target_: bevunify.losses.FootprintOffsetLoss
  min_visibility: ${min_visibility}
  key: ${key}

bev_weight: -10.0
bev:
  _target_: bevunify.losses.BCESegmentationLoss
  min_visibility: ${min_visibility}
  pos_weight: 2.13
  key: ${key}
