# PointBeV native: BCE(pos_weight=2.13) seg + center + offset, balanced by LEARNABLE
# homoscedastic uncertainty weighting (PointBeV configs/train.yaml mode="learned", default).
# In bevunify MultipleLoss, weight=-1 => learnable: term scaled by 1/exp(w) + 0.5*w, with w
# an nn.Parameter that IS optimized (UnifiedModelModule includes loss_func.parameters()).
center_weight: -1.0
center:
  _target_: GaussianLSS.losses.CenterLoss
  min_visibility: ${min_visibility}
  key: ${key}

offset_weight: -1.0
offset:
  _target_: GaussianLSS.losses.OffsetLoss
  min_visibility: ${min_visibility}
  key: ${key}

bev_weight: -1.0
bev:
  _target_: bevunify.losses.BCESegmentationLoss
  min_visibility: ${min_visibility}
  pos_weight: 2.13
  key: ${key}
